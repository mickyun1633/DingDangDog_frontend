<!DOCTYPE html>

    @font-face {
      font-family: "HannaPro";
      src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_seven@1.0/BMHANNAPro.woff") format("woff");
      font-weight: normal;
      font-display: swap;
    }

    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #f1f1f1;
      font-family: "HannaPro";
    }

    a {
      text-decoration: none;
    }

    ul {
      list-style: none;
    }

    .admin-sidebar {
      height: 100vh;
      width: 270px;
      background-color: white;
      border-right: 3px solid #f47c2a;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      height: 160px;
      background-color: #f47c2a;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .sidebar-header a {
      color: white;
      font-size: 28px;
      font-weight: 500;
    }

    .admin-info-section {
      padding: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .user-info {
      color: #f47c2a;
      font-size: 23px;
    }

    .admin-logout-btn {
      font-weight: bold;
      margin-left: 20px;
      background-color: white;
      width: 70px;
      height: 25px;
      color: #f47c2a;
      border-radius: 5px;
      border: 1px solid #f47c2a;
      cursor: pointer;
    }

    .admin-nav-menus {
      padding: 30px;
    }

    .admin-nav-list {
      width: 190px;
      cursor: pointer;
      border-bottom: 1px solid #f47c2a;
      margin-bottom: 40px;
      padding: 5px 0;
    }

    .admin-nav-list:hover {
      background-color: #f47c2a;
    }

    .admin-nav-list:hover .admin-nav-link {
      color: white;
    }

    .admin-nav-link {
      color: #f47c2a;
      font-size: 23px;
      font-weight: 500;
      padding: 0 5px;
    }

    .sidebar-footer {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: auto;
    }

    .site-logo {
      width: 100px;
      height: 100px;
      background-color: #f47c2a;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      margin-bottom: 40px;
    }

    .wrap {
      display: flex;
      height: 100vh;
    }

    main {
      flex: 1;
    }
  </style>
</head>
